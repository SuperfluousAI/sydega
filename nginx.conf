server {
  listen 8080;
  server_name _;

  # Vite build artifacts live here.
  root /usr/share/nginx/html;
  index index.html;

  # Compress text-ish assets at request time. (Vite ships hashed filenames
  # so `gzip_static` would also work if we pre-compressed in the build.)
  gzip on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;
  gzip_min_length 1024;

  # Long cache for hashed assets; short for the HTML shell so the
  # latest build picks up on the next visit.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any path not matching a real file returns index.html.
  # Currently the app uses one route — keeping the fallback in place
  # is cheap and future-proofs the deep-link case.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cheap health probe for the Kubernetes readiness/liveness check.
  # Returns 200 from nginx itself without rendering /index.html.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
