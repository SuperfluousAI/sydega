# sydega — build + push image to ECR, then bump the chart in superfluous-ai.
#
# Same shape as superfluous-corey/.github/workflows/build-push.yml and
# superfluous-vibes/.github/workflows/build-push.yml. Different in that
# this repo is single-app: no per-app change detection, every push that
# touches relevant files builds.
#
# Flow:
#   1. hadolint Dockerfile (fail fast — don't waste an ECR immutable tag)
#   2. docker buildx build --platform linux/amd64 → push to ECR as
#      sydega-YYYYMMDD-HHMM
#   3. checkout SuperfluousAI/superfluous-ai using SUPERFLUOUS_AI_PAT
#   4. sed-bump apps/sydega/chart/values.yaml app.image.tag
#   5. commit + push to superfluous-ai main
#
# Required GHA secrets (see README):
#   ECR_AWS_ACCESS_KEY_ID
#   ECR_AWS_SECRET_ACCESS_KEY
#   SUPERFLUOUS_AI_PAT  (fine-grained, scoped to SuperfluousAI/superfluous-ai,
#                        Contents: Read and write)

name: build-push

on:
  push:
    branches: [main]
    paths:
      # Trigger only on changes that affect the built image. Workflow / docs /
      # research changes don't ship a new image.
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'nginx.conf'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-push.yml'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  ECR_REGISTRY: 596633517329.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: superfluous-apps
  APP_NAME: sydega
  AWS_REGION: us-east-1

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full clone so any git diff / blame in later steps works
          # regardless of how many commits got pushed at once. Per the
          # platform journal: shallow clones (fetch-depth: 2) miss
          # commits when 3+ are pushed together, silently breaking
          # change detection. Single-app repo doesn't need detection
          # but the lesson stands.
          fetch-depth: 0

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Compute timestamped image tag
        id: tag
        run: |
          TAG="${APP_NAME}-$(date -u +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
          # Speeds up subsequent builds. Cache lives in GHA cache, not ECR.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout superfluous-ai (for chart bump)
        uses: actions/checkout@v4
        with:
          repository: SuperfluousAI/superfluous-ai
          token: ${{ secrets.SUPERFLUOUS_AI_PAT }}
          path: superfluous-ai
          # Need recent history so we can push.
          fetch-depth: 1

      - name: Bump image tag in chart
        id: bump
        run: |
          set -e
          CHART_VALUES="superfluous-ai/apps/${APP_NAME}/chart/values.yaml"

          if [ ! -f "$CHART_VALUES" ]; then
            echo "::warning::$CHART_VALUES does not exist yet."
            echo "First-time onboarding: create the chart directory in"
            echo "superfluous-ai manually with the tag this run pushed:"
            echo "  ${{ steps.tag.outputs.tag }}"
            echo "Future runs will auto-bump."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Replace the tag: line under image:. Tolerates either flat
          # or nested-under-app key (matches the existing values.yaml).
          sed -i "s|tag: ${APP_NAME}-[0-9]\\{8\\}-[0-9]\\{4\\}.*|tag: ${{ steps.tag.outputs.tag }}|" "$CHART_VALUES"
          sed -i "s|tag: ${APP_NAME}-0\\.1\\.0-placeholder.*|tag: ${{ steps.tag.outputs.tag }}|" "$CHART_VALUES"

          if git -C superfluous-ai diff --quiet "apps/${APP_NAME}/chart/values.yaml"; then
            echo "::warning::No change to chart values.yaml after sed — tag pattern may not match. Manual fix required."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "Chart bumped to ${{ steps.tag.outputs.tag }}"

      - name: Commit + push chart bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          cd superfluous-ai
          git config user.name "sydega-ci[bot]"
          git config user.email "sydega-ci@users.noreply.github.com"
          git add "apps/${APP_NAME}/chart/values.yaml"
          git commit -m "apps/${APP_NAME}: bump image to ${{ steps.tag.outputs.tag }}

          Source: ${{ github.repository }}@${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin main
